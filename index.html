<!DOCTYPE html>
<html>
<head>
    <title>TV Time</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body{
            background:#111;
            color:white;
            font-family:Arial,sans-serif;
            margin:0;
        }

        header{
            background:#222;
            padding:15px;
            text-align:center;
        }

        #search{
            width:90%;
            max-width:400px;
            padding:10px;
            margin:20px auto;
            display:block;
            border:none;
            border-radius:5px;
        }

        .channels{
            display:grid;
            grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
            gap:15px;
            padding:20px;
        }

        .card{
            background:#1e1e1e;
            padding:15px;
            border-radius:10px;
            text-align:center;
            cursor:pointer;
        }

        .card:hover{
            background:#333;
        }

        video{
            width:100%;
            max-height:500px;
        }
    </style>
</head>
<body>

<header>
    <h1>TV Time</h1>
</header>

<input id="search" placeholder="Search channels...">

<div class="channels" id="channels"></div>

<script>
const channels = [
    {
        name:"Sample Channel",
        stream:"https://test-streams.mux.dev/x36xhzz/x36xhzz.m3u8"
    }
];

const container = document.getElementById("channels");

function loadChannels(list){
    container.innerHTML = "";

    list.forEach(channel=>{
        const card = document.createElement("div");
        card.className = "card";

        card.innerHTML = `
            <h3>${channel.name}</h3>
        `;

        card.onclick = ()=>{
            window.open(channel.stream);
        };

        container.appendChild(card);
    });
}

loadChannels(channels);

document.getElementById("search").addEventListener("input", e=>{
    const q = e.target.value.toLowerCase();

    loadChannels(
        channels.filter(c =>
            c.name.toLowerCase().includes(q)
        )
    );
});
</script>

</body>
</html>
