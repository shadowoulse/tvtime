<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TV Time</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #111;
            color: white;
        }

        header {
            padding: 15px;
            text-align: center;
            background: #222;
        }

        #player {
            width: 100%;
            background: black;
        }

        video {
            width: 100%;
            max-height: 420px;
        }

        #search {
            width: 90%;
            max-width: 400px;
            margin: 15px auto;
            display: block;
            padding: 10px;
            border: none;
            border-radius: 5px;
        }

        .channels {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 10px;
            padding: 15px;
        }

        .card {
            background: #1e1e1e;
            padding: 12px;
            border-radius: 10px;
            cursor: pointer;
            text-align: center;
        }

        .card:hover {
            background: #333;
        }
    </style>
</head>

<body>

<header>
    <h1>TV Time</h1>
</header>

<div id="player">
    <video id="videoPlayer" controls></video>
</div>

<input id="search" placeholder="Search channels...">

<div class="channels" id="channels"></div>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<script>
const video = document.getElementById("videoPlayer");
const search = document.getElementById("search");
const container = document.getElementById("channels");

let hls;
let channels = [];

// load channels
fetch("channels.json")
    .then(res => res.json())
    .then(data => {
        channels = data;
        render(channels);
    })
    .catch(() => {
        channels = [
            {
                name: "Sample Stream",
                category: "General",
                url: "https://test-streams.mux.dev/x36xhzz/x36xhzz.m3u8"
            }
        ];
        render(channels);
    });

function play(url) {
    if (hls) {
        hls.destroy();
        hls = null;
    }

    if (video.canPlayType("application/vnd.apple.mpegurl")) {
        video.src = url;
    } else if (window.Hls && Hls.isSupported()) {
        hls = new Hls();
        hls.loadSource(url);
        hls.attachMedia(video);
    }

    video.play();
}

function render(list) {
    container.innerHTML = "";

    list.forEach(ch => {
        const div = document.createElement("div");
        div.className = "card";

        div.innerHTML = `
            <h3>${ch.name}</h3>
            <p style="color:#aaa">${ch.category || ""}</p>
        `;

        div.onclick = () => play(ch.url);

        container.appendChild(div);
    });
}

search.addEventListener("input", e => {
    const q = e.target.value.toLowerCase();

    render(
        channels.filter(c =>
            c.name.toLowerCase().includes(q) ||
            (c.category || "").toLowerCase().includes(q)
        )
    );
});
</script>

</body>
</html>
