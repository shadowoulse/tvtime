<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TV Time</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #111;
    color: white;
    display: flex;
}

/* SIDEBAR */
#sidebar {
    width: 220px;
    background: #1b1b1b;
    height: 100vh;
    padding: 10px;
    box-sizing: border-box;
    overflow-y: auto;
}

.category {
    padding: 10px;
    margin: 5px 0;
    background: #2a2a2a;
    border-radius: 5px;
    cursor: pointer;
}

.category:hover {
    background: #444;
}

/* MAIN */
#main {
    flex: 1;
    padding: 10px;
}

video {
    width: 100%;
    max-height: 420px;
    background: black;
    border-radius: 6px;
}

#search {
    width: 100%;
    padding: 10px;
    margin: 10px 0;
    border: none;
    border-radius: 5px;
    outline: none;
}

.grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 10px;
}

.card {
    background: #222;
    padding: 10px;
    border-radius: 8px;
    cursor: pointer;
    transition: 0.2s;
}

.card:hover {
    background: #333;
}
</style>
</head>

<body>

<!-- SIDEBAR -->
<div id="sidebar">
    <h3>Categories</h3>
    <div class="category" onclick="filterCategory('all')">All</div>
    <div class="category" onclick="filterCategory('General')">General</div>
</div>

<!-- MAIN -->
<div id="main">

    <video id="player" controls></video>

    <input id="search" placeholder="Search channels...">

    <div class="grid" id="grid"></div>

</div>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<script>
const player = document.getElementById("player");
const grid = document.getElementById("grid");
const search = document.getElementById("search");

let hls;
let allChannels = [];

/* -----------------------
   LOAD IPTV-ORG PLAYLIST
------------------------*/
fetch("https://iptv-org.github.io/iptv/countries/us.m3u")
.then(res => res.text())
.then(parseM3U)
.then(data => {

    // safety limit so site doesn't lag
    allChannels = data.slice(0, 800);

    render(allChannels);
})
.catch(err => {
    console.log("Failed to load playlist:", err);

    allChannels = [
        {
            name: "Sample Stream",
            category: "General",
            url: "https://test-streams.mux.dev/x36xhzz/x36xhzz.m3u8"
        }
    ];

    render(allChannels);
});

/* -----------------------
   PARSE M3U FILE
------------------------*/
function parseM3U(data) {
    const lines = data.split("\n");
    const channels = [];

    let current = {};

    for (let line of lines) {
        line = line.trim();

        if (line.startsWith("#EXTINF")) {
            const parts = line.split(",");
            const groupMatch = line.match(/group-title="(.*?)"/);

            current = {
                name: parts[1] || "Unknown",
                category: groupMatch ? groupMatch[1] : "General"
            };
        }

        else if (line && !line.startsWith("#")) {
            current.url = line;
            channels.push(current);
            current = {};
        }
    }

    return channels;
}

/* -----------------------
   PLAY STREAM
------------------------*/
function play(url) {
    if (!url) {
        alert("No stream URL");
        return;
    }

    console.log("Trying stream:", url);

    if (hls) {
        hls.destroy();
        hls = null;
    }

    // Native HLS (Safari / some browsers)
    if (player.canPlayType("application/vnd.apple.mpegurl")) {
        player.src = url;
        player.play().catch(err => {
            console.log("Native play failed:", err);
        });
    }

    // HLS.js fallback
    else if (window.Hls && Hls.isSupported()) {
        hls = new Hls({
            enableWorker: true,
            lowLatencyMode: true
        });

        hls.loadSource(url);
        hls.attachMedia(player);

        hls.on(Hls.Events.ERROR, function (event, data) {
            console.log("HLS error:", data);
            alert("Stream failed (dead or blocked)");
        });
    }

    else {
        alert("Your browser cannot play this stream type");
    }
}
/* -----------------------
   RENDER CHANNELS
------------------------*/
function render(list) {
    grid.innerHTML = "";

    list.forEach(ch => {
        const div = document.createElement("div");
        div.className = "card";

        div.innerHTML = `
            <b>${ch.name}</b><br>
            <small>${ch.category}</small>
        `;

        div.onclick = () => play(ch.url);

        grid.appendChild(div);
    });
}

/* -----------------------
   SEARCH
------------------------*/
search.addEventListener("input", e => {
    const q = e.target.value.toLowerCase();

    render(allChannels.filter(c =>
        c.name.toLowerCase().includes(q) ||
        c.category.toLowerCase().includes(q)
    ));
});

/* -----------------------
   CATEGORY FILTER
------------------------*/
function filterCategory(cat) {
    if (cat === "all") {
        render(allChannels);
        return;
    }

    render(allChannels.filter(c => c.category === cat));
}
</script>

</body>
</html>
