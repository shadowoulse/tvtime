<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ultimate IPTV Player</title>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<style>
:root {
    --main-bg: #1e272e;
    --card-bg: #2c394b;
    --text-color: #ecf0f1;
    --accent-color: #007bff;
}

body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: var(--main-bg);
    color: var(--text-color);
    height: 100vh;
    display: flex;
    flex-direction: column;
}

header {
    padding: 12px;
    background: #111821;
    font-weight: bold;
}

#main-container {
    flex: 1;
    display: flex;
    overflow: hidden;
}

#player-section {
    flex: 3;
    background: black;
    display: flex;
    align-items: center;
    justify-content: center;
}

video {
    width: 100%;
    height: 100%;
}

#sidebar {
    flex: 1;
    max-width: 340px;
    background: #222c3a;
    display: flex;
    flex-direction: column;
    border-left: 1px solid #333;
}

#controls {
    padding: 10px;
    background: #2c394b;
}

input, select, button {
    width: 100%;
    margin: 4px 0;
    padding: 8px;
    border: none;
    border-radius: 5px;
}

button {
    background: var(--accent-color);
    color: white;
    cursor: pointer;
}

#channels {
    overflow-y: auto;
    flex: 1;
}

.channel {
    padding: 8px;
    border-bottom: 1px solid #333;
    cursor: pointer;
}

.channel:hover {
    background: #3a4b63;
}

.group {
    padding: 6px;
    background: #111821;
    font-size: 12px;
    opacity: 0.8;
}
</style>
</head>

<body>

<header>Ultimate IPTV Player</header>

<div id="main-container">

<div id="player-section">
    <video id="video" controls></video>
</div>

<div id="sidebar">

<div id="controls">

    <select id="sourceSelect" onchange="loadSource()"></select>

    <input id="search" placeholder="Search channels..." oninput="renderChannels()">

    <input id="m3uUrl" placeholder="Paste custom M3U URL">
    <button onclick="loadM3U()">Load Custom M3U</button>

    <input type="file" onchange="loadFile(event)">

</div>

<div id="channels"></div>

</div>

</div>

<!-- ===================== -->
<!-- 1. SOURCES (MUST BE FIRST) -->
<!-- ===================== -->
<script>
const iptvSources = {
    "GLOBAL (All Channels)": "https://iptv-org.github.io/iptv/index.m3u",
    "NEWS": "https://iptv-org.github.io/iptv/categories/news.m3u",
    "SPORTS": "https://iptv-org.github.io/iptv/categories/sports.m3u",
    "MOVIES": "https://iptv-org.github.io/iptv/categories/movies.m3u",
    "ENTERTAINMENT": "https://iptv-org.github.io/iptv/categories/entertainment.m3u",
    "MUSIC": "https://iptv-org.github.io/iptv/categories/music.m3u",
    "KIDS": "https://iptv-org.github.io/iptv/categories/kids.m3u"
};
</script>

<!-- ===================== -->
<!-- 2. MAIN APP LOGIC -->
<!-- ===================== -->
<script>

const video = document.getElementById("video");

let channels = [];
let hls = null;

/* INIT */
window.onload = () => {
    const select = document.getElementById("sourceSelect");

    for (let key in iptvSources) {
        let opt = document.createElement("option");
        opt.value = iptvSources[key];
        opt.textContent = key;
        select.appendChild(opt);
    }

    loadSource();
};

/* LOAD SOURCE */
async function loadSource() {
    const url = document.getElementById("sourceSelect").value;

    try {
        const res = await fetch(url);
        const text = await res.text();
        parseM3U(text);
    } catch (e) {
        alert("Failed to load IPTV source (CORS or network issue)");
        console.error(e);
    }
}

/* CUSTOM M3U */
async function loadM3U() {
    const url = document.getElementById("m3uUrl").value;

    try {
        const res = await fetch(url);
        const text = await res.text();
        parseM3U(text);
    } catch (e) {
        alert("Failed to load custom playlist");
    }
}

/* FILE IMPORT */
function loadFile(event) {
    const reader = new FileReader();
    reader.onload = e => parseM3U(e.target.result);
    reader.readAsText(event.target.files[0]);
}

/* PARSE M3U */
function parseM3U(data) {

    channels = [];

    const lines = data.split("\n");

    let name = "";
    let group = "Other";

    for (let line of lines) {
        line = line.trim();

        if (line.startsWith("#EXTINF")) {
            name = line.split(",")[1] || "Unknown";

            const match = line.match(/group-title="(.*?)"/);
            group = match ? match[1] : "Other";
        }

        else if (line && !line.startsWith("#")) {
            channels.push({ name, url: line, group });
        }
    }

    renderChannels();
}

/* RENDER */
function renderChannels() {

    const container = document.getElementById("channels");
    container.innerHTML = "";

    const search = document.getElementById("search").value.toLowerCase();

    let currentGroup = "";

    channels
        .filter(c => c.name.toLowerCase().includes(search))
        .forEach(ch => {

            if (ch.group !== currentGroup) {
                currentGroup = ch.group;

                const g = document.createElement("div");
                g.className = "group";
                g.textContent = currentGroup;
                container.appendChild(g);
            }

            const div = document.createElement("div");
            div.className = "channel";
            div.textContent = ch.name;

            div.onclick = () => playChannel(ch);

            container.appendChild(div);
        });
}

/* PLAY */
function playChannel(ch) {

    if (hls) {
        hls.destroy();
        hls = null;
    }

    if (ch.url.includes(".m3u8")) {

        if (Hls.isSupported()) {
            hls = new Hls();
            hls.loadSource(ch.url);
            hls.attachMedia(video);
        } else {
            video.src = ch.url;
        }

    } else {
        video.src = ch.url;
    }

    video.play().catch(() => {});
}

</script>

</body>
</html>
