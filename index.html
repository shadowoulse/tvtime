<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TV Time</title>

<style>
:root {
  --primary:#1a1a1a;
  --secondary:#2c2c2c;
  --accent:#00b3ff;
  --text:#fff;
}

body {
  margin:0;
  font-family:Segoe UI;
  background:var(--primary);
  color:var(--text);
  display:flex;
}

/* SIDEBAR */
#sidebar {
  width:220px;
  background:var(--secondary);
  height:100vh;
  padding:15px;
  box-sizing:border-box;
}

.category {
  padding:10px;
  margin:8px 0;
  background:#222;
  border-radius:8px;
  cursor:pointer;
}

.category.active {
  background:var(--accent);
}

/* MAIN */
#main {
  flex:1;
  padding:15px;
}

video {
  width:100%;
  max-height:420px;
  background:black;
  border-radius:10px;
}

#search-input {
  width:100%;
  padding:12px;
  margin:10px 0;
  border-radius:8px;
  border:none;
}

.grid {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
  gap:12px;
  margin-top:15px;
}

.channel-card {
  background:#222;
  padding:12px;
  border-radius:10px;
  cursor:pointer;
}

.channel-card:hover {
  background:#333;
}
</style>
</head>

<body>

<div id="sidebar">
  <h3>Channels</h3>
  <div class="category active" data-cat="all">All</div>
  <div class="category" data-cat="news">News</div>
  <div class="category" data-cat="sports">Sports</div>
  <div class="category" data-cat="general">General</div>
</div>

<div id="main">

  <video id="player" controls></video>

  <input id="search-input" placeholder="Search channels...">

  <div id="grid" class="grid"></div>

</div>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<script>
const player = document.getElementById("player");
const grid = document.getElementById("grid");
const search = document.getElementById("search-input");
const cats = document.querySelectorAll(".category");

let hls;
let channels = [];

/* REAL IPTV SOURCE */
fetch("https://iptv-org.github.io/iptv/countries/us.m3u")
.then(r => r.text())
.then(parseM3U)
.then(data => {
  channels = data.slice(0, 200); // prevent lag
  render(channels);
});

/* PARSE M3U */
function parseM3U(data){
  const lines = data.split("\n");
  const list = [];
  let current = {};

  for (let line of lines){
    line = line.trim();

    if(line.startsWith("#EXTINF")){
      const name = line.split(",")[1];
      const group = line.match(/group-title="(.*?)"/);

      current = {
        name:name || "Unknown",
        category: group ? group[1].toLowerCase() : "general"
      };
    }

    else if(line && !line.startsWith("#")){
      current.url = line;
      list.push(current);
    }
  }

  return list;
}

/* PLAY STREAM */
function play(url){
  if(hls){
    hls.destroy();
  }

  if(player.canPlayType("application/vnd.apple.mpegurl")){
    player.src = url;
  } else if(Hls.isSupported()){
    hls = new Hls();
    hls.loadSource(url);
    hls.attachMedia(player);
  }

  player.play();
}

/* RENDER */
function render(list){
  grid.innerHTML = "";

  list.forEach(ch => {
    const div = document.createElement("div");
    div.className = "channel-card";

    div.innerHTML = `
      <b>${ch.name}</b><br>
      <small>${ch.category}</small>
    `;

    div.onclick = () => play(ch.url);
    grid.appendChild(div);
  });
}

/* SEARCH */
search.addEventListener("input", e=>{
  const q = e.target.value.toLowerCase();

  render(channels.filter(c =>
    c.name.toLowerCase().includes(q)
  ));
});

/* CATEGORY FILTER */
cats.forEach(c=>{
  c.onclick = ()=>{
    document.querySelectorAll(".category").forEach(x=>x.classList.remove("active"));
    c.classList.add("active");

    const cat = c.dataset.cat;

    if(cat === "all") return render(channels);

    render(channels.filter(x => x.category.includes(cat)));
  };
});
</script>

</body>
</html>
