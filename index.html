<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TV Time</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #111;
    color: white;
    display: flex;
}

/* sidebar */
#sidebar {
    width: 200px;
    background: #1b1b1b;
    height: 100vh;
    padding: 10px;
    box-sizing: border-box;
}

.category {
    padding: 10px;
    margin: 5px 0;
    background: #2a2a2a;
    border-radius: 5px;
    cursor: pointer;
}

.category:hover {
    background: #444;
}

/* main area */
#main {
    flex: 1;
    padding: 10px;
}

video {
    width: 100%;
    max-height: 400px;
    background: black;
}

#search {
    width: 100%;
    padding: 10px;
    margin: 10px 0;
    border: none;
    border-radius: 5px;
}

.grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 10px;
}

.card {
    background: #222;
    padding: 10px;
    border-radius: 8px;
    cursor: pointer;
}

.card:hover {
    background: #333;
}
</style>
</head>

<body>

<div id="sidebar">
    <h3>Categories</h3>
    <div class="category" onclick="filterCategory('all')">All</div>
    <div class="category" onclick="filterCategory('General')">General</div>
</div>

<div id="main">
    <video id="player" controls></video>

    <input id="search" placeholder="Search channels...">

    <div class="grid" id="grid"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<script>
const player = document.getElementById("player");
const grid = document.getElementById("grid");
const search = document.getElementById("search");

let hls;
let allChannels = [];

/* ---------------------------
   LOAD M3U PLAYLIST
----------------------------*/
fetch("playlist.m3u")
  .then(res => res.text())
  .then(parseM3U)
  .then(data => {
      allChannels = data;
      render(allChannels);
  })
  .catch(err => {
      console.log("No playlist found, using fallback");

      allChannels = [
          {
              name: "Sample Stream",
              category: "General",
              url: "https://test-streams.mux.dev/x36xhzz/x36xhzz.m3u8"
          }
      ];

      render(allChannels);
  });

/* ---------------------------
   PARSE M3U FILE
----------------------------*/
function parseM3U(data) {
    const lines = data.split("\n");
    const channels = [];

    let current = {};

    for (let line of lines) {
        line = line.trim();

        if (line.startsWith("#EXTINF")) {
            // Extract channel name
            const parts = line.split(",");
            current = {
                name: parts[1] || "Unknown",
                category: "IPTV"
            };
        }

        else if (line && !line.startsWith("#")) {
            current.url = line;
            channels.push(current);
            current = {};
        }
    }

    return channels;
}

/* ---------------------------
   PLAY STREAM
----------------------------*/
function play(url) {
    if (hls) {
        hls.destroy();
        hls = null;
    }

    if (player.canPlayType("application/vnd.apple.mpegurl")) {
        player.src = url;
    } else if (window.Hls && Hls.isSupported()) {
        hls = new Hls();
        hls.loadSource(url);
        hls.attachMedia(player);
    }

    player.play();
}

/* ---------------------------
   RENDER CHANNELS
----------------------------*/
function render(list) {
    grid.innerHTML = "";

    list.forEach(ch => {
        const div = document.createElement("div");
        div.className = "card";

        div.innerHTML = `
            <b>${ch.name}</b><br>
            <small>${ch.category}</small>
        `;

        div.onclick = () => play(ch.url);

        grid.appendChild(div);
    });
}

/* ---------------------------
   SEARCH
----------------------------*/
search.addEventListener("input", e => {
    const q = e.target.value.toLowerCase();

    render(allChannels.filter(c =>
        c.name.toLowerCase().includes(q)
    ));
});
</script>
