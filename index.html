<!DOCTYPE html>
<html>
<head>
    <title>TV Time</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: #111;
            color: white;
        }

        header {
            padding: 15px;
            background: #222;
            text-align: center;
        }

        #player {
            width: 100%;
            max-height: 400px;
            background: black;
        }

        video {
            width: 100%;
            height: 100%;
        }

        #search {
            width: 90%;
            max-width: 400px;
            margin: 15px auto;
            display: block;
            padding: 10px;
            border-radius: 5px;
            border: none;
        }

        .channels {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 10px;
            padding: 15px;
        }

        .card {
            background: #1e1e1e;
            padding: 15px;
            border-radius: 10px;
            cursor: pointer;
            text-align: center;
        }

        .card:hover {
            background: #333;
        }
    </style>
</head>

<body>

<header>
    <h1>TV Time</h1>
</header>

<div id="player">
    <video id="videoPlayer" controls></video>
</div>

<input id="search" placeholder="Search channels...">

<div class="channels" id="channels"></div>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<script>
const channels = [
    {
        name: "Sample Stream",
        url: "https://test-streams.mux.dev/x36xhzz/x36xhzz.m3u8"
    }
];

const video = document.getElementById("videoPlayer");
const container = document.getElementById("channels");

let hls;

function playStream(url) {
    if (hls) {
        hls.destroy();
    }

    if (video.canPlayType("application/vnd.apple.mpegurl")) {
        video.src = url;
    } else {
        hls = new Hls();
        hls.loadSource(url);
        hls.attachMedia(video);
    }

    video.play();
}

function loadChannels(list) {
    container.innerHTML = "";

    list.forEach(ch => {
        const card = document.createElement("div");
        card.className = "card";
        card.innerHTML = `<h3>${ch.name}</h3>`;

        card.onclick = () => playStream(ch.url);

        container.appendChild(card);
    });
}

loadChannels(channels);

document.getElementById("search").addEventListener("input", e => {
    const q = e.target.value.toLowerCase();

    loadChannels(
        channels.filter(c =>
            c.name.toLowerCase().includes(q)
        )
    );
});
</script>

</body>
</html>
